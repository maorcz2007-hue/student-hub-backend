version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: studenthub-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: studenthub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: studenthub-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studenthub-backend
    restart: always
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/studenthub?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super_secret_access_key_123_456
      - JWT_REFRESH_SECRET=super_secret_refresh_key_789_101
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
  redisdata:
